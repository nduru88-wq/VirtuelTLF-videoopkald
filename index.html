<style>
:root{
  --bg:#0b1220;
  --text:#fff;
  --muted:rgba(255,255,255,.78);
  --stroke:rgba(255,255,255,.14);
  --shadow:0 10px 26px rgba(0,0,0,.35);
  --pad:12px;
  --gap:10px;
  --layoutGap:8px;
  --radius:22px;

  --focusScale:1.03;
  --unfocusOpacity:.55;

  --btnH:56px;
  --btnHSmall:46px;

  --focusBorder:5px;

  --avatarBig:clamp(140px, 22vh, 220px);

  --sideColW: min(380px, 27vw);
  --centerColW: min(560px, 38vw);

  --smallImgFrac: 48%;

  --quietRed:#ff3b3b;

  --groupW: min(260px, 34vw);

  /* ✅ NY: spacing i Peter-feltet (kun luft) */
  --peterPhoneBottom: 16px;   /* afstand mellem nummer og knapper */
  --peterBtnGap: 12px;        /* afstand mellem knapper */
}

*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
body{
  background:
    radial-gradient(1200px 800px at 50% 0%, rgba(80,140,255,.25), transparent 55%),
    radial-gradient(900px 600px at 10% 90%, rgba(0,255,170,.10), transparent 55%),
    var(--bg);
  color:var(--text);
  overflow:hidden;
}
.page{
  height:100%;
  padding:var(--pad);
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
  justify-content:flex-start;
}

/* Header */
.header{
  width:100%;
  display:grid;
  grid-template-columns: var(--groupW) 1fr var(--groupW);
  align-items:center;
  gap:12px;
  padding-top:4px;
  user-select:none;
}
.iconGroup{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.topIcon{
  width:52px;height:52px;border-radius:14px;
  background:rgba(255,255,255,.08);
  border:1px solid var(--stroke);
  display:grid;place-items:center;
  box-shadow:var(--shadow);
  -webkit-tap-highlight-color:transparent;
}
.topIcon img{width:70%;height:70%;object-fit:contain}
.topIcon.btn{ cursor:pointer; }
.topIcon.btn:active{ transform:scale(.99); }

h1{
  margin:0;
  font-size:clamp(18px,2.2vw,28px);
  letter-spacing:.2px;
  text-align:center;
  justify-self:center;
}

.stage{
  position:relative;
  width:100%;
  flex:1;
  display:flex;
  align-items:stretch;
  justify-content:center;
  overflow:hidden;
}

/* 3-kolonne layout */
.layout{
  position:relative;
  width:min(1600px, 100%);
  height:100%;
  display:grid;
  grid-template-columns: var(--sideColW) var(--centerColW) var(--sideColW);
  gap:var(--layoutGap);
  padding:10px;
  border-radius:28px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.sideCol{
  display:grid;
  grid-template-rows:repeat(4, 1fr);
  gap:var(--gap);
  min-height:0;
}
.centerCol{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:0;
}

/* Tiles */
.tile{
  position:relative;
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:var(--shadow);
  background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.07));
  overflow:hidden;

  opacity:var(--unfocusOpacity);
  transform:scale(.98);
  filter:saturate(.9);
  transition:transform 220ms ease, opacity 220ms ease, filter 220ms ease;

  user-select:none;
  -webkit-tap-highlight-color: transparent;
  cursor:pointer;
  min-height:0;
}
.tile.focused{
  opacity:1;
  transform:scale(var(--focusScale));
  filter:saturate(1.05);
  cursor:default;
}

/* Peter (center) – lidt højere */
.tile.big{
  height: calc(62% - (var(--gap) / 2));
  aspect-ratio: 1 / 1;
  width: auto;

  padding:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}

/* Små sidekort */
.tile.small{
  padding:10px;
  display:grid;
  grid-template-columns: var(--smallImgFrac) 1fr;
  gap:10px;
  align-items:stretch;
}

/* Big avatar */
.avatarBig{
  width:var(--avatarBig);
  height:var(--avatarBig);
  border-radius:999px;
  overflow:hidden;
  border:4px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  box-shadow:
    0 10px 22px rgba(0,0,0,.32),
    0 0 0 6px color-mix(in srgb, var(--accent) 20%, transparent),
    0 0 40px color-mix(in srgb, var(--accent) 40%, transparent);
  flex-shrink:0;
  pointer-events:none;
}
.avatarBig img{width:100%;height:100%;object-fit:cover;display:block}

/* Small photo area */
.photo{
  border-radius:18px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  box-shadow:0 10px 18px rgba(0,0,0,.26);
  pointer-events:none;
  position:relative;
  min-height:0;
}
.photo img{ width:100%; height:100%; object-fit:cover; display:block; }
.photo:after{
  content:"";
  position:absolute;
  inset:0;
  box-shadow:
    inset 0 0 0 4px color-mix(in srgb, var(--accent) 22%, transparent),
    inset 0 0 28px color-mix(in srgb, var(--accent) 18%, transparent);
  pointer-events:none;
}

/* Meta */
.metaBig{
  width:100%;
  text-align:center;
  padding:0 10px 6px;
  pointer-events:none;
}
.metaSmall{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
  padding:2px 2px 2px 0;
  pointer-events:none;
}
.name{ margin:0; font-weight:950; letter-spacing:.2px; line-height:1.05; }
.name.big{ font-size:clamp(18px, 2.4vh, 26px); }
.name.small{
  font-size:clamp(16px, 2.2vh, 22px);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.phone{ margin:0; color:var(--muted); line-height:1.1; }
.phone.big{ font-size:clamp(12px, 1.8vh, 15px); }
.phone.small{
  font-size:clamp(12px, 1.8vh, 15px);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* ✅ NY: kun luft (ingen strukturændring) */
.tile.big .phone.big{ margin-bottom: var(--peterPhoneBottom); }

/* Ring-knap */
.callBtn{
  width:100%;
  height:var(--btnHSmall);
  border-radius:16px;
  border:1px solid color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,.16));
  background:color-mix(in srgb, var(--accent) 32%, rgba(255,255,255,.10));
  color:#fff;
  font-weight:950;
  font-size:16px;
  letter-spacing:.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  user-select:none;
  opacity:.92;
  pointer-events:none;
}
.callBtn:active{ transform:scale(.98); }
.dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
.callBtn.small{ height:var(--btnHSmall); border-radius:14px; justify-content:center; padding:0 12px; }
.callBtn.big{
  height:var(--btnH);
  font-size:18px;
  border-radius:18px;
  pointer-events:auto;
  opacity:1;
}
.tile.focused .callBtn.small{ pointer-events:auto; opacity:1; }

/* ✅ NY: afstand mellem de 2 knapper (kun margin-top) */
.tile.big .callBtn.big.video{ margin-top: var(--peterBtnGap); }

/* Peter: lydopkald grøn */
.callBtn.big.audio{
  border-color: rgba(0,208,122,.70);
  background: linear-gradient(180deg, rgba(0,208,122,.40), rgba(0,208,122,.18));
}
.callBtn.big.audio .dot{ background:#00d07a; }

/* Peter: videoopkald blå */
.callBtn.big.video{
  border-color: rgba(0,132,255,.70);
  background: linear-gradient(180deg, rgba(0,132,255,.40), rgba(0,132,255,.18));
}
.callBtn.big.video .dot{ background:#0084ff; }

/* Nattero: rød knap på små felter */
.tile.quiet .callBtn.small{
  border-color: rgba(255,60,60,.65) !important;
  background: linear-gradient(180deg, rgba(255,60,60,.35), rgba(255,60,60,.16)) !important;
}
.tile.quiet .dot{ background: var(--quietRed) !important; }

/* Fokusramme */
.focusBox{
  position:absolute;
  border-radius:calc(var(--radius) + 10px);
  border:var(--focusBorder) solid rgba(255,255,255,.92);
  box-shadow: 0 0 0 7px rgba(0,0,0,.28), 0 18px 60px rgba(0,0,0,.45);
  pointer-events:none;
  transition: left 180ms ease, top 180ms ease, width 180ms ease, height 180ms ease;
  will-change:left,top,width,height;
  z-index:50;
}

/* Overlay (fælles) */
.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:#05070c;
  z-index:9999;
  padding:18px;
  -webkit-tap-highlight-color: transparent;
}
.overlay.show{ display:flex; }
.dialog{
  width:min(920px, 100%);
  border-radius:28px;
  border:2px solid rgba(255,255,255,.18);

  padding:22px;
  text-align:center;
}

/* Confirm overlay */
.dialogTitle{

  font-weight:1000;

}
.dialogName{
  margin:0 0 18px;

  font-size:clamp(22px, 3.4vw, 44px);
  color:#fff;
  text-transform:uppercase;
}
.dialogHint{
  margin:0 0 18px;
  opacity:.85;
  font-size:clamp(14px, 2.0vw, 20px);
}
.btnRow{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
.bigBtn{
  height:clamp(64px, 10vh, 96px);
  border-radius:22px;
  border:2px solid rgba(255,255,255,.18);
  font-size:clamp(18px, 2.4vw, 30px);
  font-weight:1000;
  letter-spacing:.6px;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  cursor:pointer;

}
.bigBtn:active{ transform:scale(.99); }
.yes{

}
.no{

  border-color:rgba(255,60,60,.55);
}

/* Blocked overlay */
.blockTitle{ margin:0 0 12px; font-weight:1000; letter-spacing:.6px; font-size:clamp(22px, 3.2vw, 44px); text-transform:uppercase; }
.blockText{ margin:0 0 18px; opacity:.9; font-size:clamp(14px, 2.1vw, 22px); }
.okRow{ display:flex; justify-content:center; }
.okBtn{

  height:clamp(64px, 10vh, 96px);
  border-radius:22px;
  border:2px solid rgba(255,255,255,.18);
  font-size:clamp(18px, 2.4vw, 30px);
  font-weight:1000;
  letter-spacing:.6px;
  color:#fff;

  align-items:center;
  justify-content:center;
  user-select:none;
  cursor:pointer;

  border-color:rgba(255,60,60,.55);
}
.okBtn:active{ transform:scale(.99); }

/* Virtuel ur modal */
.vclockTitle{
  margin:0 0 10px;
  font-weight:1000;
  letter-spacing:.6px;
  font-size:clamp(22px, 3.4vw, 42px);
  text-transform:uppercase;
}
.vclockSub{
  margin:0 0 16px;
  opacity:.85;
  font-size:clamp(14px, 2.0vw, 20px);
}
.vclockRow{
  display:flex;
  gap:12px;
  justify-content:center;
  align-items:center;

.vclockInput{
  height:56px;
  padding:0 14px;
  border-radius:16px;

.vclockActions{

.vclockBtnBig{
  height:clamp(64px, 10vh, 92px);
  border-radius:22px;

.vclockActivate{

.vclockDeactivate{

.vclockClose{

  border:1px solid rgba(255,255,255,.18);

  justify-content:center;

/* =========================
   Nattero indstillinger
   ========================= */
const QUIET_START = "22:00";
const QUIET_END   = "08:00";

function parseHHMM(s){
  const [hh, mm] = s.split(":").map(Number);
  return (hh * 60) + mm;
}
const QUIET_START_MIN = parseHHMM(QUIET_START);
const QUIET_END_MIN   = parseHHMM(QUIET_END);

/* =========================
   Virtuel ur state
   ========================= */
const SIM_TIME_KEY = "simTimeHHMM";
const SIM_ON_KEY   = "simTimeEnabled";

function getSimTime(){ return localStorage.getItem(SIM_TIME_KEY); }
function setSimTime(hhmm){ localStorage.setItem(SIM_TIME_KEY, hhmm); }

function isSimEnabled(){ return localStorage.getItem(SIM_ON_KEY) === "1"; }
function setSimEnabled(on){
  if (on) localStorage.setItem(SIM_ON_KEY, "1");
  else localStorage.removeItem(SIM_ON_KEY);
}

function getNowMinutes(){
  if (isSimEnabled()) {
    const sim = getSimTime();
    if (sim) return parseHHMM(sim);
  }
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function isQuietNow(){
  const now = getNowMinutes();
  if (QUIET_START_MIN === QUIET_END_MIN) return false;

  if (QUIET_START_MIN < QUIET_END_MIN){
    return now >= QUIET_START_MIN && now < QUIET_END_MIN;
  } else {
    return (now >= QUIET_START_MIN) || (now < QUIET_END_MIN);
  }
}

const clockHeaderBtn = document.getElementById("clockHeaderBtn");

const overlayConfirm = document.getElementById("overlayConfirm");
const dlgName = document.getElementById("dlgName");
const btnYes  = document.getElementById("btnYes");
const btnNo   = document.getElementById("btnNo");

const overlayBlocked = document.getElementById("overlayBlocked");
const blockedText = document.getElementById("blockedText");
const btnOk = document.getElementById("btnOk");
const blockedAudio = document.getElementById("blockedAudio");

const overlayVClock = document.getElementById("overlayVClock");
const vclockStatus = document.getElementById("vclockStatus");
const vclockTime = document.getElementById("vclockTime");
const vclockActivate = document.getElementById("vclockActivate");
const vclockDeactivate = document.getElementById("vclockDeactivate");
const vclockClose = document.getElementById("vclockClose");

function indexOfPeter(){
  return Math.max(0, contacts.findIndex(c => c.name.toLowerCase() === "peter"));
}

const peterIndex = indexOfPeter();
const peter = contacts[peterIndex];
const others = contacts
  .filter((_, i) => i !== peterIndex)
  .sort((a,b) => a.name.localeCompare(b.name, "da", { sensitivity:"base" }));

const left  = others.slice(0, 4);
const right = others.slice(4, 8);

const tileOrder = [];
const peterGlobalIndex = 4;
let focusedIndex = peterGlobalIndex;

let autoBackTimer = null;
function clearAutoBack(){
  if (autoBackTimer) { clearTimeout(autoBackTimer); autoBackTimer = null; }
}
function scheduleAutoBackIfNeeded(){
  clearAutoBack();
  if (overlayConfirm.classList.contains("show")) return;
  if (overlayBlocked.classList.contains("show")) return;
  if (overlayVClock.classList.contains("show")) return;

  if (focusedIndex !== peterGlobalIndex) {
    autoBackTimer = setTimeout(() => setFocusPeter(), AUTO_BACK_MS);
  }
}

let pendingCall = null;

function openConfirm(c){
  pendingCall = { name:c.name, phone:c.phone };
  dlgName.textContent = c.name.toUpperCase();
  overlayConfirm.classList.add("show");
  overlayConfirm.setAttribute("aria-hidden", "false");
  clearAutoBack();
}
function closeConfirm(){
  pendingCall = null;
  overlayConfirm.classList.remove("show");
  overlayConfirm.setAttribute("aria-hidden", "true");
  scheduleAutoBackIfNeeded();
}

function playBlockedMp3(){
  try{
    blockedAudio.currentTime = 0;
    const p = blockedAudio.play();
    if (p && typeof p.catch === "function") p.catch(()=>{});
  }catch(e){}
}
function openBlocked(message){
  blockedText.textContent = message || "Kan ikke ringes til i dette tidsrum.";
  overlayBlocked.classList.add("show");
  overlayBlocked.setAttribute("aria-hidden", "false");
  clearAutoBack();
  playBlockedMp3();
}
function closeBlocked(){
  overlayBlocked.classList.remove("show");
  overlayBlocked.setAttribute("aria-hidden", "true");
  scheduleAutoBackIfNeeded();
}

function refreshVClockUI(){
  const enabled = isSimEnabled();
  const t = getSimTime() || "02:00";
  vclockTime.value = t;
  vclockStatus.textContent = enabled
    ? `Virtuel tid er AKTIV: ${t} (skærmen følger virtuel tid)`
    : `Bruger rigtig tid. (Sæt tid og tryk AKTIVÉR)`;
}
function openVClock(){
  refreshVClockUI();
  overlayVClock.classList.add("show");
  overlayVClock.setAttribute("aria-hidden", "false");
  clearAutoBack();
}
function closeVClock(){
  overlayVClock.classList.remove("show");
  overlayVClock.setAttribute("aria-hidden", "true");
  scheduleAutoBackIfNeeded();
}

function callNumber(phone){
  location.href = `tel:${phone}`;
}

function startMessengerCall(userId){
  if (!userId) return;
  const intentUrl =
    "intent://user/" + userId +
    "#Intent;" +
    "scheme=fb-messenger;" +
    "package=com.facebook.orca;" +
    "end";
  window.location.href = intentUrl;
}

function isLockedContact(c){
  if (!c) return false;
  if (c.name.toLowerCase() === "peter") return false;
  return isQuietNow();
}

overlayConfirm.addEventListener("click", (e) => { if (e.target === overlayConfirm) closeConfirm(); });
overlayBlocked.addEventListener("click", (e) => { if (e.target === overlayBlocked) closeBlocked(); });
overlayVClock.addEventListener("click", (e) => { if (e.target === overlayVClock) closeVClock(); });

btnNo.addEventListener("click", closeConfirm);
btnYes.addEventListener("click", () => {
  if (!pendingCall) return;
  const phone = pendingCall.phone;
  closeConfirm();
  callNumber(phone);
});
btnOk.addEventListener("click", closeBlocked);

vclockClose.addEventListener("click", closeVClock);
vclockActivate.addEventListener("click", () => {
  const t = vclockTime.value || "02:00";
  setSimTime(t);
  setSimEnabled(true);
  refreshVClockUI();
  updateQuietUI();
});
vclockDeactivate.addEventListener("click", () => {
  setSimEnabled(false);
  refreshVClockUI();
  updateQuietUI();
});

clockHeaderBtn.addEventListener("click", (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (overlayConfirm.classList.contains("show")) return;
  if (overlayBlocked.classList.contains("show")) return;
  if (overlayVClock.classList.contains("show")) return;
  openVClock();
});

function makeTile(c, globalIndex, sizeClass){
  const tile = document.createElement("div");
  tile.className = `tile ${sizeClass}`;
  tile.style.setProperty("--accent", c.accent);
  tile.dataset.index = String(globalIndex);
  tile.dataset.name = c.name;

  if (sizeClass === "big") {
    tile.innerHTML = `
      <div class="avatarBig"><img src="${c.img}" alt="${c.name}"></div>
      <div class="metaBig">
        <p class="name big">${c.name}</p>
        <p class="phone big">${c.display}</p>

        <div class="callBtn big audio" role="button" aria-label="Lydopkald til ${c.name}">
          <span class="dot"></span> LYDOPKALD
        </div>

        <div class="callBtn big video" role="button" aria-label="Videoopkald til ${c.name}">
          <span class="dot"></span> VIDEOOPKALD
        </div>
      </div>
    `;
  } else {
    tile.innerHTML = `
      <div class="photo"><img src="${c.img}" alt="${c.name}"></div>
      <div class="metaSmall">
        <p class="name small">${c.name}</p>
        <p class="phone small">${c.display}</p>
        <div class="callBtn small" role="button" aria-label="Ring til ${c.name}">
          <span class="dot"></span> RING
        </div>
      </div>
    `;
  }

  function attemptCallOrMessage(){
    if (isLockedContact(c)) {
      openBlocked(`Kan ikke ringes til i tidsrummet ${QUIET_START}–${QUIET_END}.`);
      return;
    }
    if (c.name.toLowerCase() === "peter") return;
    openConfirm(c);
  }

  tile.addEventListener("click", () => {
    if (overlayConfirm.classList.contains("show")) return;
    if (overlayBlocked.classList.contains("show")) return;
    if (overlayVClock.classList.contains("show")) return;

    if (sizeClass === "small") {
      if (focusedIndex === globalIndex) attemptCallOrMessage();
      else setFocus(globalIndex);
    } else {
      if (focusedIndex !== globalIndex) setFocus(globalIndex);
    }
  }, { passive:true });

  if (sizeClass === "big") {
    const audioBtn = tile.querySelector(".callBtn.big.audio");
    const videoBtn = tile.querySelector(".callBtn.big.video");

    audioBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (overlayConfirm.classList.contains("show")) return;
      if (overlayBlocked.classList.contains("show")) return;
      if (overlayVClock.classList.contains("show")) return;
      startMessengerCall(c.messengerUserId);
    });

    videoBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (overlayConfirm.classList.contains("show")) return;
      if (overlayBlocked.classList.contains("show")) return;
      if (overlayVClock.classList.contains("show")) return;
      startMessengerCall(c.messengerUserId);
    });
  } else {
    const btn = tile.querySelector(".callBtn");
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (overlayConfirm.classList.contains("show")) return;
      if (overlayBlocked.classList.contains("show")) return;
      if (overlayVClock.classList.contains("show")) return;

      if (focusedIndex === globalIndex) attemptCallOrMessage();
      else setFocus(globalIndex);
    });
  }

  return tile;
}

left.forEach((c, idx) => {
  const globalIndex = idx;
  const tile = makeTile(c, globalIndex, "small");
  leftCol.appendChild(tile);
  tileOrder[globalIndex] = tile;
});

const peterTile = makeTile(peter, peterGlobalIndex, "big");
centerCol.appendChild(peterTile);
tileOrder[peterGlobalIndex] = peterTile;

right.forEach((c, idx) => {
  const globalIndex = 5 + idx;
  const tile = makeTile(c, globalIndex, "small");
  rightCol.appendChild(tile);
  tileOrder[globalIndex] = tile;
});

function moveFocusBoxToTile(i){
  const container = layout.getBoundingClientRect();
  const t = tileOrder[i].getBoundingClientRect();
  const pad = 6;
  focusBox.style.left = `${(t.left - container.left) - pad}px`;
  focusBox.style.top = `${(t.top - container.top ) - pad}px`;
  focusBox.style.width = `${t.width + (pad * 2)}px`;
  focusBox.style.height = `${t.height + (pad * 2)}px`;
}
function setFocus(i){
  focusedIndex = i;
  tileOrder.forEach((t, idx) => t.classList.toggle("focused", idx === focusedIndex));
  moveFocusBoxToTile(focusedIndex);
  scheduleAutoBackIfNeeded();
}
function setFocusPeter(){
  closeConfirm();
  closeBlocked();
  closeVClock();
  setFocus(peterGlobalIndex);
}

function updateQuietUI(){
  const quiet = isQuietNow();
  tileOrder.forEach((tile) => {
    if (!tile) return;
    const name = (tile.dataset.name || "").toLowerCase();
    const isPeter = name === "peter";
    const shouldQuiet = quiet && !isPeter && tile.classList.contains("small");

    tile.classList.toggle("quiet", shouldQuiet);

    const btn = tile.querySelector(".callBtn.small");
    if (!btn) return;

    btn.innerHTML = shouldQuiet
      ? `<span class="dot"></span> RING (LUKKET)`
      : `<span class="dot"></span> RING`;
  });
}

/* Init */
requestAnimationFrame(() => {
  setFocusPeter();
  refreshVClockUI();
  updateQuietUI();
});

setInterval(updateQuietUI, 30 * 1000);

window.addEventListener("pageshow", () => requestAnimationFrame(() => {
  setFocusPeter();
  refreshVClockUI();
  updateQuietUI();
}));
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    requestAnimationFrame(() => {
      setFocusPeter();
      refreshVClockUI();
      updateQuietUI();
    });
  }
});
window.addEventListener("resize", () => {
  requestAnimationFrame(() => moveFocusBoxToTile(focusedIndex));
});
</script>
</body>
</html>
